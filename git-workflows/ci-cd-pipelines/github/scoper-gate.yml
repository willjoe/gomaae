name: Scoper Enforcement Gate

on:
  pull_request:
    branches: [ main, master ]

jobs:
  scoper-audit:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necessary for git diff

      - name: Setup Node.js
        uses: actions/checkout@v4
        with:
          node-version: '20'

      - name: Extract Ticket Metadata
        id: metadata
        run: |
          # 1. Retrieve the 'allow_write' scope stored in the .agent_state during branch creation
          # The branch name should contain the TASK ID, e.g., feat/TASK-123
          TASK_ID=$(echo "${{ github.head_ref }}" | grep -oE 'TASK-[0-9]+' || echo "UNKNOWN")
          METADATA_FILE=".agent_state/${TASK_ID}.md"
          
          if [ -f "$METADATA_FILE" ]; then
            # Extract allow_write array from the markdown frontmatter or JSON block
            # For this example, we assume the orchestrator wrote a clean JSON file
            ALLOW_WRITE=$(jq -c '.allow_write' ".agent_state/${TASK_ID}.json")
            echo "scope=$ALLOW_WRITE" >> $GITHUB_OUTPUT
            echo "Found authorized scope for $TASK_ID"
          else
            echo "❌ Error: No Zero-Trust metadata found for branch. Rejection mandatory."
            exit 1
          fi

      - name: Run Scoper Enforcer
        id: enforcer
        continue-on-error: true
        run: |
          node scripts/scoper-enforcer.js \
            --ticket-metadata='{"allow_write": ${{ steps.metadata.outputs.scope }} }' \
            --base-branch=${{ github.base_ref }} > enforcer_output.txt 2>&1
          
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          cat enforcer_output.txt
          exit $EXIT_CODE

      - name: Post Results to PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('enforcer_output.txt', 'utf8');
            const exitCode = "${{ steps.enforcer.outputs.exit_code }}";
            const icon = exitCode === "0" ? "✅" : "❌";
            const status = exitCode === "0" ? "PASSED" : "FAILED";
            
            const body = `### ${icon} Scoper Enforcement ${status}
            
            \`\`\`
            ${output}
            \`\`\`
            
            *This check is part of the Zero-Trust Chain of Command. PRs with unauthorized file mutations are automatically blocked.*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            })
