version: '3.8'

services:
  orchestrator-prod:
    build:
      context: .
    ports:
      - "4000:4000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ..:/workspace:ro
    environment:
      - NODE_ENV=production
    # The app self-initializes its config.yaml and per-workstation project.db on
    # first use — no bootstrap script or global DB.
    command: npm start
