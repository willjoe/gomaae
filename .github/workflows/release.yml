name: Release

# Triggers on version tags: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    permissions:
      contents: write   # needed to create GitHub Releases and upload assets

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest     # Apple Silicon + Intel (universal)
            args: --target universal-apple-darwin
            rust_target: aarch64-apple-darwin x86_64-apple-darwin
          - platform: windows-2022     # windows-2022 has VS 2022; windows-latest now
            args: ''                   # ships VS 2025 which node-gyp 10.x can't detect
            rust_target: ''
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.3'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Import Apple certificate
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      # Build the Node.js sidecar explicitly so its node_modules (including sharp's
      # native .dylib/.node files) exist on disk before we sign them below.
      - name: Build sidecar
        if: matrix.platform == 'macos-latest'
        run: node scripts/build-sidecar.mjs

      # Apple notarization requires every binary inside the bundle to be
      # individually signed with the Developer ID certificate and hardened runtime.
      # The sharp image library ships pre-compiled .dylib and .node files that
      # tauri-action does not sign automatically — we must do it ourselves.
      - name: Sign native binaries in sidecar-dist
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          find src-tauri/sidecar-dist -type f \( -name "*.dylib" -o -name "*.node" -o -name "*.so" \) | while read f; do
            echo "Signing: $f"
            codesign --force --sign "$APPLE_SIGNING_IDENTITY" --timestamp --options runtime "$f"
          done

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: Gomaae ${{ github.ref_name }}
          releaseBody: |
            See the assets below to download and install Gomaae ${{ github.ref_name }}.

            The desktop app will auto-update from this release on next launch.
          releaseDraft: true       # publish as draft — review before going live
          prerelease: false
          args: ${{ matrix.args }}
          updaterJsonKeepUniversal: true   # merge arm64+x64 into one darwin entry in latest.json

      # tauri-action re-packs Gomaae.app.tar.gz before uploading, which invalidates
      # the .sig that Tauri's build created and causes latest.json to be skipped.
      # Re-sign the re-packed tarball ourselves, then assemble and upload latest.json.
      - name: Sign and upload update manifest (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"

          TARBALL="src-tauri/target/universal-apple-darwin/release/bundle/macos/Gomaae.app.tar.gz"
          if [ ! -f "$TARBALL" ]; then
            echo "::error::Tarball not found: $TARBALL"
            find src-tauri/target -name "*.tar.gz" 2>/dev/null || true
            exit 1
          fi

          # Re-sign the re-packed tarball (TAURI_SIGNING_PRIVATE_KEY* picked up from env).
          # Key was generated without a password, so we force an empty password to avoid
          # an interactive prompt in CI.
          ABS_TARBALL="$(pwd)/$TARBALL"
          npx tauri signer sign --password "" "$ABS_TARBALL"

          SIGNATURE=$(cat "${TARBALL}.sig")
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Tauri v2 resolves the host arch at runtime: darwin-aarch64 (Apple Silicon)
          # or darwin-x86_64 (Intel). "darwin-universal" is not a recognised key.
          # Both entries point to the same universal binary so either arch auto-updates.
          jq -n \
            --arg version "$VERSION" \
            --arg notes "See the release page for details." \
            --arg pub_date "$PUB_DATE" \
            --arg signature "$SIGNATURE" \
            --arg url "https://github.com/${REPO}/releases/download/${TAG}/Gomaae_universal.app.tar.gz" \
            '{version: $version, notes: $notes, pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {signature: $signature, url: $url},
                "darwin-x86_64":  {signature: $signature, url: $url}
              }}' \
            > latest.json

          # Merge Windows entry if it was already uploaded by the Windows job.
          EXISTING=$(gh release download "$TAG" --pattern latest.json --output - --repo "$REPO" 2>/dev/null || echo '{}')
          WIN_ENTRY=$(echo "$EXISTING" | jq '.platforms["windows-x86_64"] // empty')
          if [ -n "$WIN_ENTRY" ]; then
            jq --argjson win "$WIN_ENTRY" '.platforms["windows-x86_64"] = $win' latest.json > latest.json.tmp
            mv latest.json.tmp latest.json
            echo "✓ merged existing windows-x86_64 entry into latest.json"
          fi

          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
          echo "✓ latest.json uploaded for $TAG ($VERSION)"

      - name: Sign and upload update manifest (Windows)
        if: matrix.platform == 'windows-2022'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"

          NSIS="src-tauri/target/release/bundle/nsis/Gomaae_${VERSION}_x64-setup.nsis.zip"
          if [ ! -f "$NSIS" ]; then
            echo "::warning::NSIS zip not found at $NSIS — skipping Windows manifest entry"
            find src-tauri/target/release/bundle -name "*.nsis.zip" 2>/dev/null || true
            exit 0
          fi

          npx tauri signer sign --password "" "$NSIS"
          SIGNATURE=$(cat "${NSIS}.sig")
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          # Fetch the current latest.json (macOS may have uploaded it already) and
          # add/overwrite the windows-x86_64 entry, then re-upload.
          EXISTING=$(gh release download "$TAG" --pattern latest.json --output - --repo "$REPO" 2>/dev/null || echo '{}')
          echo "$EXISTING" | jq \
            --arg version "$VERSION" \
            --arg notes "See the release page for details." \
            --arg pub_date "$PUB_DATE" \
            --arg signature "$SIGNATURE" \
            --arg url "https://github.com/${REPO}/releases/download/${TAG}/Gomaae_${VERSION}_x64-setup.nsis.zip" \
            '. + {version: $version, notes: $notes, pub_date: $pub_date} |
             .platforms["windows-x86_64"] = {signature: $signature, url: $url}' \
            > latest.json

          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
          echo "✓ windows-x86_64 entry added to latest.json for $TAG ($VERSION)"
