name: Release

# Triggers on version tags: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    permissions:
      contents: write   # needed to create GitHub Releases and upload assets

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest     # Apple Silicon + Intel (universal)
            args: --target universal-apple-darwin
            rust_target: aarch64-apple-darwin x86_64-apple-darwin
          # Windows disabled: better-sqlite3 has no prebuilt for recent Node on
          # Windows runners and node-gyp 10.x can't detect VS 2025 (version 18).
          # Re-enable once that's resolved upstream or via a prebuilt workaround.
          # - platform: windows-latest
          #   args: ''
          #   rust_target: ''
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.3'
          cache: npm
          cache-dependency-path: gomaae/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: gomaae/src-tauri -> target

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        working-directory: gomaae
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: gomaae
          tagName: ${{ github.ref_name }}
          releaseName: Gomaae ${{ github.ref_name }}
          releaseBody: |
            See the assets below to download and install Gomaae ${{ github.ref_name }}.

            The desktop app will auto-update from this release on next launch.
          releaseDraft: true       # publish as draft — review before going live
          prerelease: false
          args: ${{ matrix.args }}
          updaterJsonKeepUniversal: true   # merge arm64+x64 into one darwin entry in latest.json

      # tauri-action@v0 has a bug where it logs "Signature not found for the updater JSON.
      # Skipping upload..." even when the .sig file exists. Work around it by generating
      # and uploading latest.json ourselves from the .sig file Tauri produced.
      - name: Upload update manifest (macOS)
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          SIG="gomaae/src-tauri/target/universal-apple-darwin/release/bundle/macos/Gomaae.app.tar.gz.sig"

          if [ ! -f "$SIG" ]; then
            echo "::error::Signature file not found: $SIG"
            exit 1
          fi

          SIGNATURE=$(cat "$SIG")
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          REPO="${{ github.repository }}"

          # Upload .sig so users can verify the download independently
          gh release upload "$TAG" "$SIG#Gomaae_universal.app.tar.gz.sig" \
            --repo "$REPO" --clobber

          # Assemble and upload latest.json
          jq -n \
            --arg version "$VERSION" \
            --arg notes "See the release page for details." \
            --arg pub_date "$PUB_DATE" \
            --arg signature "$SIGNATURE" \
            --arg url "https://github.com/${REPO}/releases/download/${TAG}/Gomaae_universal.app.tar.gz" \
            '{version: $version, notes: $notes, pub_date: $pub_date,
              platforms: {"darwin-universal": {signature: $signature, url: $url}}}' \
            > latest.json

          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
          echo "✓ latest.json uploaded for $TAG"
