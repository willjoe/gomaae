version: '3.8'

services:
  orchestrator:
    build:
      context: .
    ports:
      - "4000:4000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - orchestrator_data:/app/data
      - ..:/workspace:ro
    environment:
      - NODE_ENV=development
      - SEED_MOCK_DATA=true
      - DATABASE_PATH=/app/data/ticket-manager.db

volumes:
  orchestrator_data:
  orchestrator_repos:
